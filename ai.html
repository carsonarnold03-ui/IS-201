<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0ead6;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            color: #002E5D;
        }

        #score-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        #score {
            font-size: 48px;
            font-weight: bold;
            color: #002E5D;
            margin-bottom: 2rem;
        }

        #coin {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #e0e0e0;
            border: 1px solid #ccc;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            transition: transform 0.4s;
        }

        #result-msg {
            font-size: 22px;
            font-weight: bold;
            min-height: 28px;
            margin-bottom: 0.5rem;
        }

        #result-sub {
            font-size: 14px;
            color: #666;
            min-height: 20px;
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 1rem;
        }

        button {
            padding: 0.6rem 2rem;
            font-size: 15px;
            cursor: pointer;
            background-color: #002E5D;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background-color: #004080;
        }

        #reset-btn {
            background: none;
            color: #888;
            text-decoration: underline;
            font-size: 13px;
            border: none;
            cursor: pointer;
        }

        .win {
            color: green;
        }

        .lose {
            color: red;
        }

        #victory {
            display: none;
            background-color: #002E5D;
            color: white;
            padding: 1.5rem;
            border-radius: 10px;
            margin: 1.5rem auto;
            max-width: 400px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Coin Toss</h1>

    <div id="score-label">Score</div>
    <div id="score">0</div>

    <div id="coin">🪙</div>

    <div id="result-msg"></div>
    <div id="result-sub"></div>

    <div id="victory">🏆 You Win the Toss! You called 7 correct. Enjoy the ball!</div>

    <div class="btn-group">
        <button onclick="guess('heads')">Heads</button>
        <button onclick="guess('tails')">Tails</button>
    </div>

    <button id="reset-btn" onclick="resetGame()">Reset</button>

    <br><br>
    <a href="fromScratch.html">← Back to BYU Football</a>

    <script>
        var score = 0;
        var flipping = false;

        function guess(pick) {
            if (flipping) return;
            flipping = true;

            var coin = document.getElementById('coin');
            var msg = document.getElementById('result-msg');
            var sub = document.getElementById('result-sub');

            msg.textContent = '';
            sub.textContent = '';
            coin.style.transform = 'rotateY(720deg)';
            coin.style.transition = 'transform 0.6s ease';

            setTimeout(function() {
                var result = Math.random() < 0.5 ? 'heads' : 'tails';
                coin.textContent = result === 'heads' ? '🟡' : '⚪';
                coin.style.transform = 'rotateY(0deg)';
                coin.style.transition = 'none';

                if (pick === result) {
                    score++;
                    document.getElementById('score').textContent = score;

                    if (score === 7) {
                        document.getElementById('victory').style.display = 'block';
                        msg.textContent = '';
                        sub.textContent = '';
                        flipping = true;
                    } else {
                        msg.textContent = 'Your Ball!';
                        msg.className = 'win';
                        sub.textContent = 'It was ' + result + '. You called it right.';
                        flipping = false;
                    }

                } else {
                    msg.textContent = 'Their Ball.';
                    msg.className = 'lose';
                    sub.textContent = 'It was ' + result + '. Better luck next toss.';
                    flipping = false;
                }

            }, 650);
        }

        function resetGame() {
            score = 0;
            flipping = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('coin').textContent = '🪙';
            document.getElementById('result-msg').textContent = '';
            document.getElementById('result-sub').textContent = '';
            document.getElementById('victory').style.display = 'none';
        }
    </script>

</body>
</html>
